<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VentasTrack</title>
  <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.9/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111318;font-family:'Segoe UI',sans-serif;color:#e8edf5;min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#3a424f;border-radius:3px}
    input,select{background:#1a1f28;border:1px solid #3a424f;color:#e8edf5;border-radius:8px;padding:7px 11px;font-family:inherit;font-size:14px;outline:none;width:100%}
    input:focus,select:focus{border-color:#58a6ff}
    button{cursor:pointer;font-family:inherit;transition:all .15s}
    .card{background:#1a1f28;border:1px solid #2d3440;border-radius:12px;padding:14px;margin-bottom:10px}
    .btn-g{background:none;border:1px solid #3a424f;color:#d8dfe8;padding:7px 12px;border-radius:8px;font-size:13px}
    .btn-g:hover{border-color:#58a6ff;color:#58a6ff}
    .btn-s{background:none;border:1px solid #3a424f;color:#a8b3c2;padding:5px 10px;border-radius:6px;font-size:12px}
    .btn-s.on{background:#21262d;border-color:#58a6ff;color:#58a6ff}
    .tab{background:none;border:none;border-bottom:2px solid transparent;color:#a8b3c2;padding:9px 14px;white-space:nowrap;font-size:13px;font-weight:500}
    .tab.on{color:#58a6ff;border-bottom-color:#58a6ff}
    .pbg{background:#2d3440;border-radius:99px;overflow:hidden}
    .pfill{height:100%;border-radius:99px;transition:width .6s}
    .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .kv{display:grid;gap:10px;margin-bottom:12px;grid-template-columns:repeat(2,1fr)}
    @media(min-width:600px){.kv{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:900px){.kv{grid-template-columns:repeat(5,1fr)}}
    .c2{display:grid;gap:12px;margin-bottom:10px;grid-template-columns:1fr}
    @media(min-width:700px){.c2{grid-template-columns:1fr 1fr}}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#1e232e;color:#a8b3c2;font-weight:600;padding:9px 10px;text-align:left;border-bottom:1px solid #2d3440;white-space:nowrap}
    td{padding:8px 10px;border-bottom:1px solid #1e232e;color:#d8dfe8}
    tr:hover td{background:#1e232e}
    .wrap{max-width:1200px;margin:0 auto;padding:12px}
    .hdr{background:#161b23;border-bottom:1px solid #2d3440;padding:0 16px;position:sticky;top:0;z-index:10}
    .hdr-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px}
    .hdr h1{font-size:15px;font-weight:700;color:#58a6ff;padding:12px 0;margin-right:8px}
    .tabs-row{display:flex;overflow-x:auto;gap:0;scrollbar-width:none}
    .tabs-row::-webkit-scrollbar{display:none}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .filter-row select{width:auto;min-width:110px}
    .section-title{font-size:13px;font-weight:600;color:#a8b3c2;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    .kpi-val{font-size:22px;font-weight:700;color:#e8edf5;margin:4px 0 2px}
    .kpi-lbl{font-size:11px;color:#a8b3c2}
    .kpi-sub{font-size:11px;margin-top:2px}
    .empty{text-align:center;padding:40px;color:#a8b3c2;font-size:14px}
    .spin{width:32px;height:32px;border:3px solid #2d3440;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .obj-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .obj-row input[type=number]{width:130px}
    .feriado-chip{display:inline-block;background:#1a1f28;border:1px solid #2d3440;border-radius:8px;padding:6px 12px;font-size:13px;margin:4px}
    .feriado-chip.pasado{opacity:.45}
    .feriado-chip.hoy{border-color:#58a6ff;background:#1a2535}
    .feriado-chip.proximo{border-color:#3fb950;background:#1a2820}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,Cell}=Recharts;

const SHEET_ID="1-H36Kkdh_XSG3MZmWUQDBs5BInfeo2dY";
const GID="496653887";
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const COLORS=["#58a6ff","#3fb950","#f78166","#d2a8ff","#ffa657","#79c0ff","#56d364","#ff7b72","#a371f7","#e3b341"];

const fmt=n=>n==null?"—":"$"+Math.round(n).toLocaleString("es-AR");
const fmtK=n=>{if(n==null)return"—";if(Math.abs(n)>=1e9)return"$"+(n/1e9).toFixed(1)+"B";if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+Math.round(n).toLocaleString("es-AR")};

function parseDateParts(str){
  if(!str)return null;
  const s=str.trim().replace(/\r/g,"");
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return{y:+m[1],m:+m[2]-1,d:+m[3]};
  const m2=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m2)return{y:+m2[3],m:+m2[1]-1,d:+m2[2]};
  return null;
}

function parseCSV(text){
  const lines=text.split("\n");
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    if(!line.trim())continue;
    const vals=line.split(",").map(v=>v.trim().replace(/"/g,"").replace(/\r/g,""));
    if(vals.length<4)continue;
    const dateStr=vals[0];
    const dp=parseDateParts(dateStr);
    if(!dp)continue;
    const amt=parseFloat(vals[3].replace(/[^\d.-]/g,""));
    if(isNaN(amt)||amt<=0)continue;
    rows.push({date:dateStr,dp,vendedor:vals[1].trim(),cliente:vals[2].trim(),importe:amt});
  }
  return rows;
}

const FERIADOS_2026=[
  {fecha:"2026-01-01",nombre:"Año Nuevo"},
  {fecha:"2026-03-02",nombre:"Carnaval"},
  {fecha:"2026-03-03",nombre:"Carnaval"},
  {fecha:"2026-03-24",nombre:"Día de la Memoria"},
  {fecha:"2026-04-02",nombre:"Malvinas"},
  {fecha:"2026-04-03",nombre:"Viernes Santo"},
  {fecha:"2026-05-01",nombre:"Día del Trabajador"},
  {fecha:"2026-05-25",nombre:"Revolución de Mayo"},
  {fecha:"2026-06-15",nombre:"Paso a la Inmortalidad (Güemes)"},
  {fecha:"2026-06-20",nombre:"Paso a la Inmortalidad (Belgrano)"},
  {fecha:"2026-07-09",nombre:"Independencia"},
  {fecha:"2026-08-17",nombre:"Paso a la Inmortalidad (San Martín)"},
  {fecha:"2026-10-12",nombre:"Diversidad Cultural"},
  {fecha:"2026-11-20",nombre:"Soberanía Nacional"},
  {fecha:"2026-12-08",nombre:"Inmaculada Concepción"},
  {fecha:"2026-12-25",nombre:"Navidad"},
];

function App(){
  const [tab,setTab]=useState("dash");
  const [sales,setSales]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [selYear,setSelYear]=useState(new Date().getFullYear());
  const [selMonth,setSelMonth]=useState(new Date().getMonth());
  const [objs,setObjs]=useState(()=>{try{return JSON.parse(localStorage.getItem("vt_objs")||"{}")}catch{return{}}});
  const [search,setSearch]=useState("");
  const [filtVend,setFiltVend]=useState("");

  const saveObjs=useCallback(o=>{setObjs(o);try{localStorage.setItem("vt_objs",JSON.stringify(o))}catch{};},[]);

  const loadAll=useCallback(async()=>{
    setLoading(true);setError("");
    try{
      const r=await fetch(CSV_URL);
      if(!r.ok)throw new Error("HTTP "+r.status);
      const text=await r.text();
      const rows=parseCSV(text);
      if(!rows.length)throw new Error("No se encontraron datos válidos");
      setSales(rows);
    }catch(e){setError("Error al cargar datos: "+e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);

  const vendors=useMemo(()=>[...new Set(sales.map(s=>s.vendedor))].filter(Boolean).sort(),[sales]);
  const years=useMemo(()=>[...new Set(sales.map(s=>s.dp.y))].sort((a,b)=>b-a),[sales]);

  const monthSales=useMemo(()=>sales.filter(s=>s.dp.y===selYear&&s.dp.m===selMonth),[sales,selYear,selMonth]);
  const prevMonthSales=useMemo(()=>{
    let py=selYear,pm=selMonth-1;
    if(pm<0){pm=11;py--;}
    return sales.filter(s=>s.dp.y===py&&s.dp.m===pm);
  },[sales,selYear,selMonth]);

  const totalMes=useMemo(()=>monthSales.reduce((a,s)=>a+s.importe,0),[monthSales]);
  const totalPrev=useMemo(()=>prevMonthSales.reduce((a,s)=>a+s.importe,0),[prevMonthSales]);
  const varMes=totalPrev>0?((totalMes-totalPrev)/totalPrev*100):null;
  const ticketProm=monthSales.length>0?totalMes/monthSales.length:0;
  const clientesMes=useMemo(()=>new Set(monthSales.map(s=>s.cliente)).size,[monthSales]);

  const objKey=`${selYear}-${selMonth}`;
  const objTotal=objs[objKey]?parseFloat(objs[objKey]):null;
  const objPct=objTotal&&objTotal>0?Math.min(totalMes/objTotal*100,999):null;

  const yearlyData=useMemo(()=>{
    return MESES.map((lbl,mi)=>{
      const v=sales.filter(s=>s.dp.y===selYear&&s.dp.m===mi).reduce((a,s)=>a+s.importe,0);
      return{mes:lbl.slice(0,3),total:v||0};
    });
  },[sales,selYear]);

  const rankData=useMemo(()=>{
    const map={};
    monthSales.forEach(s=>{map[s.vendedor]=(map[s.vendedor]||0)+s.importe;});
    return Object.entries(map).map(([v,t])=>({vendedor:v,total:t})).sort((a,b)=>b.total-a.total);
  },[monthSales]);

  const topVend=rankData[0]?.vendedor||"";

  const byDayData=useMemo(()=>{
    const filtered=monthSales.filter(s=>!filtVend||s.vendedor===filtVend);
    const map={};
    filtered.forEach(s=>{const k=s.dp.d;map[k]=(map[k]||0)+s.importe;});
    return Object.entries(map).map(([d,t])=>({dia:+d,total:t})).sort((a,b)=>a.dia-b.dia);
  },[monthSales,filtVend]);

  const ventasFiltered=useMemo(()=>{
    return monthSales
      .filter(s=>(!filtVend||s.vendedor===filtVend)&&(!search||s.cliente.toLowerCase().includes(search.toLowerCase())||s.vendedor.toLowerCase().includes(search.toLowerCase())))
      .sort((a,b)=>b.dp.d-a.dp.d)
      .slice(0,500);
  },[monthSales,filtVend,search]);

  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const TABS=[{id:"dash",l:"📊 Dashboard"},{id:"rank",l:"🏆 Ranking"},{id:"rend",l:"📈 Rendimiento"},{id:"ventas",l:"📋 Ventas"},{id:"obj",l:"🎯 Objetivos"},{id:"feriados",l:"📅 Feriados"}];

  function renderFilters(showVend=false){
    return(
      <div className="filter-row">
        <select value={selYear} onChange={e=>setSelYear(+e.target.value)} style={{width:"auto",minWidth:80}}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <select value={selMonth} onChange={e=>setSelMonth(+e.target.value)} style={{width:"auto",minWidth:110}}>
          {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        {showVend&&<select value={filtVend} onChange={e=>setFiltVend(e.target.value)} style={{width:"auto",minWidth:130}}>
          <option value="">Todos los vendedores</option>
          {vendors.map(v=><option key={v} value={v}>{v}</option>)}
        </select>}
        <button className="btn-g" onClick={loadAll}>↻</button>
      </div>
    );
  }

  function renderDash(){
    return(
      <div>
        {renderFilters()}
        <div className="kv">
          <div className="card">
            <div className="kpi-lbl">Total del mes</div>
            <div className="kpi-val">{fmtK(totalMes)}</div>
            {varMes!==null&&<div className="kpi-sub"><span className="chip" style={{background:varMes>=0?"#1a2820":"#2d1a1a",color:varMes>=0?"#3fb950":"#f78166"}}>{varMes>=0?"▲":"▼"}{Math.abs(varMes).toFixed(1)}% vs mes ant.</span></div>}
          </div>
          <div className="card">
            <div className="kpi-lbl">Ticket promedio</div>
            <div className="kpi-val">{fmtK(ticketProm)}</div>
            <div className="kpi-sub" style={{color:"#a8b3c2",fontSize:11}}>{monthSales.length} transacciones</div>
          </div>
          <div className="card">
            <div className="kpi-lbl">Clientes únicos</div>
            <div className="kpi-val">{clientesMes}</div>
          </div>
          <div className="card">
            <div className="kpi-lbl">Objetivo del mes</div>
            <div className="kpi-val">{objTotal?fmtK(objTotal):"—"}</div>
            {objPct!==null&&<div style={{marginTop:6}}><div className="pbg" style={{height:6}}><div className="pfill" style={{width:Math.min(objPct,100)+"%",background:objPct>=100?"#3fb950":"#58a6ff"}}/></div><div className="kpi-sub" style={{color:"#a8b3c2",marginTop:4}}>{objPct.toFixed(1)}%</div></div>}
          </div>
          <div className="card">
            <div className="kpi-lbl">Top vendedor</div>
            <div className="kpi-val" style={{fontSize:16}}>{rankData[0]?.vendedor||"—"}</div>
            <div className="kpi-sub" style={{color:"#a8b3c2",fontSize:11}}>{rankData[0]?fmtK(rankData[0].total):""}</div>
          </div>
        </div>
        <div className="card">
          <div className="section-title">Ventas por mes — {selYear}</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={yearlyData} margin={{top:4,right:8,left:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3440"/>
              <XAxis dataKey="mes" tick={{fill:"#a8b3c2",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"#a8b3c2",fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>fmtK(v)}/>
              <Tooltip formatter={v=>[fmt(v),"Ventas"]} contentStyle={{background:"#1a1f28",border:"1px solid #2d3440",borderRadius:8,fontSize:12}} labelStyle={{color:"#e8edf5"}}/>
              <Bar dataKey="total" fill="#58a6ff" radius={[4,4,0,0]}>
                {yearlyData.map((entry,i)=><Cell key={i} fill={i===selMonth?"#79c0ff":"#58a6ff"}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    );
  }

  function renderRank(){
    return(
      <div>
        {renderFilters()}
        {rankData.length===0?<div className="empty">Sin datos para este período</div>:(
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <table>
              <thead><tr><th>#</th><th>Vendedor</th><th>Total</th><th>%</th><th>Progress</th></tr></thead>
              <tbody>
                {rankData.map((r,i)=>{
                  const pct=totalMes>0?r.total/totalMes*100:0;
                  return(
                    <tr key={r.vendedor}>
                      <td style={{color:"#a8b3c2",width:32}}>{i+1}</td>
                      <td style={{fontWeight:i===0?700:400,color:i===0?"#58a6ff":"#d8dfe8"}}>{r.vendedor}</td>
                      <td style={{fontWeight:600}}>{fmt(r.total)}</td>
                      <td style={{color:"#a8b3c2"}}>{pct.toFixed(1)}%</td>
                      <td style={{width:140}}>
                        <div className="pbg" style={{height:8}}>
                          <div className="pfill" style={{width:pct+"%",background:COLORS[i%COLORS.length]}}/>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }

  function renderRendimiento(){
    return(
      <div>
        {renderFilters(true)}
        {byDayData.length===0?<div className="empty">Sin datos para este período</div>:(
          <div className="card">
            <div className="section-title">Ventas por día — {MESES[selMonth]} {selYear}{filtVend?` · ${filtVend}`:""}</div>
            <ResponsiveContainer width="100%" height={280}>
              <LineChart data={byDayData} margin={{top:4,right:8,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3440"/>
                <XAxis dataKey="dia" tick={{fill:"#a8b3c2",fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#a8b3c2",fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>fmtK(v)}/>
                <Tooltip formatter={v=>[fmt(v),"Ventas"]} contentStyle={{background:"#1a1f28",border:"1px solid #2d3440",borderRadius:8,fontSize:12}} labelStyle={{color:"#e8edf5"}} labelFormatter={d=>`Día ${d}`}/>
                <Line type="monotone" dataKey="total" stroke="#58a6ff" strokeWidth={2} dot={{fill:"#58a6ff",r:3}} activeDot={{r:5}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        )}
        {!filtVend&&rankData.length>0&&(
          <div className="c2">
            {rankData.map((r,i)=>{
              const vd=monthSales.filter(s=>s.vendedor===r.vendedor);
              const vmap={};
              vd.forEach(s=>{const k=s.dp.d;vmap[k]=(vmap[k]||0)+s.importe;});
              const vdata=Object.entries(vmap).map(([d,t])=>({dia:+d,total:t})).sort((a,b)=>a.dia-b.dia);
              return(
                <div className="card" key={r.vendedor}>
                  <div className="section-title" style={{color:COLORS[i%COLORS.length]}}>{r.vendedor}</div>
                  <div style={{color:"#e8edf5",fontWeight:700,marginBottom:8,fontSize:15}}>{fmt(r.total)}</div>
                  <ResponsiveContainer width="100%" height={120}>
                    <BarChart data={vdata} margin={{top:2,right:2,left:0,bottom:0}}>
                      <XAxis dataKey="dia" tick={{fill:"#a8b3c2",fontSize:10}} axisLine={false} tickLine={false}/>
                      <YAxis hide/>
                      <Tooltip formatter={v=>[fmt(v),"Ventas"]} contentStyle={{background:"#1a1f28",border:"1px solid #2d3440",borderRadius:8,fontSize:11}} labelFormatter={d=>`Día ${d}`}/>
                      <Bar dataKey="total" fill={COLORS[i%COLORS.length]} radius={[3,3,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function renderVentas(){
    return(
      <div>
        {renderFilters(true)}
        <div className="filter-row">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente o vendedor..." style={{maxWidth:280}}/>
          {search&&<button className="btn-g" onClick={()=>setSearch("")}>✕</button>}
        </div>
        <div style={{color:"#a8b3c2",fontSize:12,marginBottom:8}}>Mostrando {ventasFiltered.length} de {monthSales.length} registros</div>
        {ventasFiltered.length===0?<div className="empty">Sin resultados</div>:(
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr><th>Fecha</th><th>Vendedor</th><th>Cliente</th><th style={{textAlign:"right"}}>Importe</th></tr></thead>
                <tbody>
                  {ventasFiltered.map((s,i)=>(
                    <tr key={i}>
                      <td style={{color:"#a8b3c2",whiteSpace:"nowrap"}}>{s.date}</td>
                      <td>{s.vendedor}</td>
                      <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.cliente}</td>
                      <td style={{textAlign:"right",fontWeight:600}}>{fmt(s.importe)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    );
  }

  function renderObj(){
    const allVendors=vendors.length?vendors:["(sin vendedores)"];
    return(
      <div>
        {renderFilters()}
        <div className="card">
          <div className="section-title" style={{marginBottom:12}}>Objetivo total del mes</div>
          <div className="obj-row">
            <input type="number" placeholder="Ej: 50000000" value={objs[objKey]||""} onChange={e=>{const o={...objs};if(e.target.value)o[objKey]=e.target.value;else delete o[objKey];saveObjs(o);}}/>
            {objs[objKey]&&<span style={{color:"#a8b3c2",fontSize:13,whiteSpace:"nowrap"}}>{fmtK(+objs[objKey])}</span>}
          </div>
          {objPct!==null&&(
            <div style={{marginTop:8}}>
              <div className="pbg" style={{height:10}}>
                <div className="pfill" style={{width:Math.min(objPct,100)+"%",background:objPct>=100?"#3fb950":"#58a6ff"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:12,color:"#a8b3c2"}}>
                <span>Logrado: {fmtK(totalMes)}</span>
                <span>{objPct.toFixed(1)}%</span>
                <span>Objetivo: {fmtK(+objs[objKey])}</span>
              </div>
            </div>
          )}
        </div>
        <div className="card">
          <div className="section-title" style={{marginBottom:12}}>Objetivos por vendedor</div>
          {allVendors.map(v=>{
            const vKey=`${selYear}-${selMonth}-${v}`;
            const vTotal=monthSales.filter(s=>s.vendedor===v).reduce((a,s)=>a+s.importe,0);
            const vObj=objs[vKey]?parseFloat(objs[vKey]):null;
            const vPct=vObj&&vObj>0?Math.min(vTotal/vObj*100,999):null;
            return(
              <div key={v} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontWeight:600,fontSize:13}}>{v}</span>
                  <span style={{color:"#a8b3c2",fontSize:12}}>{fmt(vTotal)}</span>
                </div>
                <div className="obj-row" style={{marginBottom:4}}>
                  <input type="number" placeholder="Objetivo" value={objs[vKey]||""} onChange={e=>{const o={...objs};if(e.target.value)o[vKey]=e.target.value;else delete o[vKey];saveObjs(o);}}/>
                </div>
                {vPct!==null&&(
                  <div>
                    <div className="pbg" style={{height:6}}>
                      <div className="pfill" style={{width:Math.min(vPct,100)+"%",background:vPct>=100?"#3fb950":"#58a6ff"}}/>
                    </div>
                    <div style={{fontSize:11,color:"#a8b3c2",marginTop:3}}>{vPct.toFixed(1)}%</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function renderFeriados(){
    return(
      <div>
        <div className="card">
          <div className="section-title" style={{marginBottom:12}}>Feriados nacionales 2026</div>
          <div>
            {FERIADOS_2026.map(f=>{
              const cls=f.fecha<todayStr?"pasado":f.fecha===todayStr?"hoy":"proximo";
              const dp=parseDateParts(f.fecha);
              const label=dp?`${dp.d} ${MESES[dp.m].slice(0,3)}`:f.fecha;
              return(
                <span key={f.fecha} className={`feriado-chip ${cls}`}>
                  <span style={{fontWeight:700,marginRight:5}}>{label}</span>
                  <span style={{color:"#a8b3c2"}}>{f.nombre}</span>
                  {cls==="hoy"&&<span style={{marginLeft:6,color:"#58a6ff",fontWeight:700}}>● HOY</span>}
                </span>
              );
            })}
          </div>
          <div style={{marginTop:14,fontSize:12,color:"#a8b3c2",display:"flex",gap:16,flexWrap:"wrap"}}>
            <span><span style={{color:"#a8b3c2"}}>■</span> Pasado</span>
            <span><span style={{color:"#58a6ff"}}>■</span> Hoy</span>
            <span><span style={{color:"#3fb950"}}>■</span> Próximo</span>
          </div>
        </div>
        <div className="card">
          <div className="section-title" style={{marginBottom:8}}>Días hábiles — {MESES[selMonth]} {selYear}</div>
          {(()=>{
            const daysInMonth=new Date(selYear,selMonth+1,0).getDate();
            const feriadosDelMes=FERIADOS_2026.filter(f=>{const dp=parseDateParts(f.fecha);return dp&&dp.y===selYear&&dp.m===selMonth;}).map(f=>parseDateParts(f.fecha).d);
            let habiles=0,feriados=0,finde=0;
            for(let d=1;d<=daysInMonth;d++){
              const dow=new Date(selYear,selMonth,d).getDay();
              if(dow===0||dow===6)finde++;
              else if(feriadosDelMes.includes(d))feriados++;
              else habiles++;
            }
            return(
              <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:13}}>
                <div className="card" style={{flex:1,minWidth:100,marginBottom:0,textAlign:"center"}}>
                  <div className="kpi-val">{habiles}</div>
                  <div className="kpi-lbl">Días hábiles</div>
                </div>
                <div className="card" style={{flex:1,minWidth:100,marginBottom:0,textAlign:"center"}}>
                  <div className="kpi-val" style={{color:"#f78166"}}>{feriados}</div>
                  <div className="kpi-lbl">Feriados</div>
                </div>
                <div className="card" style={{flex:1,minWidth:100,marginBottom:0,textAlign:"center"}}>
                  <div className="kpi-val" style={{color:"#a8b3c2"}}>{finde}</div>
                  <div className="kpi-lbl">Fin de semana</div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="hdr">
        <div className="hdr-in">
          <h1>📊 VentasTrack</h1>
          <div className="tabs-row">
            {TABS.map(t=><button key={t.id} className={`tab${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
          </div>
        </div>
      </div>
      <div className="wrap">
        {loading&&<div className="spin"/>}
        {error&&<div style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{color:"#ff5e5e",fontWeight:600,marginBottom:8}}>{error}</div>
          <button className="btn-g" onClick={loadAll}>↻ Reintentar</button>
        </div>}
        {!loading&&!error&&tab==="dash"&&renderDash()}
        {!loading&&!error&&tab==="rank"&&renderRank()}
        {!loading&&!error&&tab==="rend"&&renderRendimiento()}
        {!loading&&!error&&tab==="ventas"&&renderVentas()}
        {!loading&&!error&&tab==="obj"&&renderObj()}
        {!loading&&!error&&tab==="feriados"&&renderFeriados()}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
