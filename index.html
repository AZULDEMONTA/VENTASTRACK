<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VentasTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#111318;color:#e8edf5;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#3a424f;border-radius:3px}
input,select{background:#1a1f28;border:1px solid #3a424f;color:#e8edf5;border-radius:8px;padding:7px 11px;font-family:inherit;font-size:14px;outline:none;width:100%}
input:focus,select:focus{border-color:#58a6ff}
button{cursor:pointer;font-family:inherit;transition:all .15s}
.card{background:#1a1f28;border:1px solid #2d3440;border-radius:12px;padding:14px;margin-bottom:10px}
.btn-p{background:#238636;border:1px solid #2ea043;color:#fff;padding:7px 14px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer}
.btn-p:hover{background:#2ea043}
.btn-g{background:none;border:1px solid #3a424f;color:#d8dfe8;padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-g:hover{border-color:#58a6ff;color:#58a6ff}
.nav{display:flex;overflow-x:auto;border-bottom:1px solid #2d3440;margin-bottom:16px}
.nav button{background:none;border:none;border-bottom:2px solid transparent;color:#a8b3c2;padding:9px 14px;white-space:nowrap;font-size:13px;font-weight:500;cursor:pointer}
.nav button.on{color:#58a6ff;border-bottom-color:#58a6ff}
.pbg{background:#2d3440;border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .6s}
.kv{display:grid;gap:10px;margin-bottom:12px;grid-template-columns:repeat(2,1fr)}
@media(min-width:600px){.kv{grid-template-columns:repeat(4,1fr)}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;color:#a8b3c2;font-weight:500;border-bottom:1px solid #2d3440;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #1e2530;vertical-align:middle}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto;padding:12px">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;background:linear-gradient(135deg,#238636,#58a6ff);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px">📊</div>
      <div>
        <div style="font-weight:700;font-size:16px">VentasTrack</div>
        <div id="lastUpdate" style="font-size:11px;color:#7a8799"></div>
      </div>
    </div>
    <button class="btn-g" style="font-size:12px;padding:5px 12px" onclick="loadAll()">↻ Actualizar</button>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="on" onclick="goTab('dash')">📊 Dashboard</button>
    <button onclick="goTab('rank')">🏆 Ranking</button>
    <button onclick="goTab('ventas')">📂 Ventas</button>
    <button onclick="goTab('obj')">🎯 Objetivos</button>
    <button onclick="goTab('feriados')">📅 Feriados</button>
  </div>

  <div id="content">
    <div style="text-align:center;padding:60px 20px;color:#a8b3c2">
      <div style="font-size:36px;margin-bottom:12px">⏳</div>
      <div style="font-size:15px">Cargando datos desde Google Sheets...</div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
var PUB_ID = '2PACX-1vQJAAPrRQU65pCbj8awH_v2bgRhn8aRGvkN5i2hgiHnLniQcVY1NS9MwDQka1OmDs2TGxojNd-c3oEc';
var GIDS = { ventas:'0', objetivos:'187233898', facturacion:'988498656', feriados:'2020984664' };

var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var MS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var TODAY = new Date();

var STATE = {
  sellers:[], goals:{}, sales:[], holidays:{}, billed:{}, billable:{},
  selMonth: TODAY.getMonth(), selYear: TODAY.getFullYear(), tab:'dash'
};

var MONTH_MAP = {};
(function(){
  var names=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var abbr=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  for(var i=0;i<12;i++){
    MONTH_MAP[names[i]]=i; MONTH_MAP[abbr[i]]=i;
    MONTH_MAP[String(i+1)]=i; MONTH_MAP[('0'+(i+1)).slice(-2)]=i;
  }
})();

function fmt(n){if(!n&&n!==0)return '$0';return '$'+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});}
function pct(v,g){return !g?0:Math.round(v/g*100);}
function sc(p){return p>=100?'#00e5a0':p>=70?'#f5c542':'#ff5e5e';}
function daysInMonth(m,y){return new Date(y,m+1,0).getDate();}
function isWknd(d){var w=d.getDay();return w===0||w===6;}
function isoD(y,m,d){return y+'-'+('0'+(m+1)).slice(-2)+'-'+('0'+d).slice(-2);}
function hKey(m,y){return y+'-'+('0'+(m+1)).slice(-2);}
function bKey(m,y){return y+'-'+m;}
function getHols(m,y){return STATE.holidays[hKey(m,y)]||[];}

function parseAmt(raw){
  if(typeof raw==='number') return raw;
  var s=String(raw).trim().replace(/[$\s]/g,'');
  if(!s||s==='-') return 0;
  s=s.replace(/\./g,'').replace(',','.');
  return parseFloat(s)||0;
}
function cleanDate(raw){
  if(!raw) return '';
  var s=String(raw).trim();
  if(s.includes('T')) return s.slice(0,10);
  var pts=s.split(/[-\/]/);
  if(pts.length===3) return pts[0].length===4?s.slice(0,10):('20'+pts[2]).slice(-4)+'-'+('0'+pts[1]).slice(-2)+'-'+('0'+pts[0]).slice(-2);
  return s;
}
function buildDays(m,y,hols){
  hols=hols||[];
  var days=[];
  for(var i=1;i<=daysInMonth(m,y);i++){
    var dt=new Date(y,m,i),s=isoD(y,m,i);
    days.push({d:i,s:s,work:!isWknd(dt)&&hols.indexOf(s)===-1});
  }
  return days;
}
function totalWD(dl){var n=0;for(var i=0;i<dl.length;i++)if(dl[i].work)n++;return n;}
function wdUpTo(dl,upto){var n=0;for(var i=0;i<dl.length;i++)if(dl[i].d<=upto&&dl[i].work)n++;return n;}

// ── Fetch desde Apps Script ───────────────────────────────────
function fetchSheet(sheetName, callback) {
  var gid = GIDS[sheetName];
  var url = 'https://docs.google.com/spreadsheets/d/e/' + PUB_ID + '/pub?gid=' + gid + '&single=true&output=csv';
  fetch(url)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(function(text) { callback(null, parseCSV(text)); })
    .catch(function(err) { callback(err); });
}

function parseCSV(text) {
  var lines = text.trim().split('\n').filter(Boolean);
  if (lines.length < 2) return [];
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,'').toLowerCase(); });
  return lines.slice(1).map(function(line){
    var vals = line.split(',').map(function(v){ return v.trim().replace(/"/g,''); });
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = vals[i]||''; });
    return obj;
  });
}

function loadAll() {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px 20px;color:#a8b3c2"><div style="font-size:36px;margin-bottom:12px">⏳</div><div style="font-size:15px">Cargando datos desde Google Sheets...</div></div>';

  var results = {};
  var sheets = ['ventas','objetivos','facturacion','feriados'];
  var loaded = 0;
  var hasError = false;

  sheets.forEach(function(sheet) {
    fetchSheet(sheet, function(err, data) {
      if (hasError) return;
      if (err) {
        hasError = true;
        showError();
        return;
      }
      results[sheet] = data;
      loaded++;
      if (loaded === sheets.length) {
        processData(results);
        document.getElementById('lastUpdate').textContent = 'Actualizado: ' + new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        render();
      }
    });
  });

  // Timeout de 10 segundos
  setTimeout(function() {
    if (loaded < sheets.length && !hasError) {
      hasError = true;
      showError();
    }
  }, 10000);
}

function showError() {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="color:#ff5e5e;font-weight:600;margin-bottom:8px">No se pudo cargar el Google Sheet</div><div style="color:#a8b3c2;font-size:13px;margin-bottom:20px">Verificá que el Apps Script esté publicado como "Cualquier persona"</div><button class="btn-p" onclick="loadAll()">↻ Reintentar</button></div>';
}

function processData(sheets) {
  var fk = function(r) {
    var names = Array.prototype.slice.call(arguments, 1);
    for (var i=0; i<names.length; i++) {
      var k = Object.keys(r).find(function(k){ return k.toLowerCase().trim() === names[i].toLowerCase(); });
      if (k !== undefined && r[k] !== '') return r[k];
    }
    return '';
  };

  // Ventas
  STATE.sales = (sheets.ventas||[]).map(function(r,i){
    return {
      id:'r'+i,
      date: cleanDate(fk(r,'fecha','date')),
      seller: String(fk(r,'vendedor','seller')||'').trim(),
      client: String(fk(r,'cliente','client')||'').trim(),
      amount: parseAmt(fk(r,'importe','amount','monto','total'))
    };
  }).filter(function(r){ return r.seller && r.amount > 0; });

  // Objetivos
  STATE.goals={}; STATE.sellers=[];
  (sheets.objetivos||[]).forEach(function(r){
    var sk = Object.keys(r).find(function(k){ return /vendedor|seller/i.test(k); });
    var seller = String(r[sk]||'').trim();
    if (!seller) return;
    if (STATE.sellers.indexOf(seller)===-1) STATE.sellers.push(seller);
    STATE.goals[seller]={};
    Object.keys(r).forEach(function(k){
      if (/vendedor|seller/i.test(k)) return;
      var mi = MONTH_MAP[k.toLowerCase().trim().replace(/\s+/g,'')];
      if (mi!==undefined){ var val=parseAmt(r[k]); if(val>0) STATE.goals[seller][mi]=val; }
    });
  });

  // Facturacion
  STATE.billed={}; STATE.billable={};
  (sheets.facturacion||[]).forEach(function(r){
    var mk = Object.keys(r).find(function(k){ return /mes|month/i.test(k); });
    var mi = MONTH_MAP[String(r[mk]||'').toLowerCase().trim()];
    if (mi===undefined) return;
    var yk = Object.keys(r).find(function(k){ return /anio|año|year/i.test(k); });
    var yr = +(r[yk]) || TODAY.getFullYear();
    var fk2 = Object.keys(r).find(function(k){ return /facturado|billed/i.test(k) && !/facturable/i.test(k); });
    var lk = Object.keys(r).find(function(k){ return /facturable|billable/i.test(k); });
    STATE.billed[bKey(mi,yr)] = parseAmt(r[fk2]||0);
    STATE.billable[bKey(mi,yr)] = parseAmt(r[lk]||0);
  });

  // Feriados
  STATE.holidays={};
  (sheets.feriados||[]).forEach(function(r){
    var fk3 = Object.keys(r).find(function(k){ return /fecha|date/i.test(k); });
    var f = cleanDate(String(r[fk3]||'').trim());
    if (!f) return;
    var d = new Date(f+'T12:00:00');
    if (isNaN(d)) return;
    var k = hKey(d.getMonth(), d.getFullYear());
    if (!STATE.holidays[k]) STATE.holidays[k]=[];
    var iso = isoD(d.getFullYear(), d.getMonth(), d.getDate());
    if (STATE.holidays[k].indexOf(iso)===-1) STATE.holidays[k].push(iso);
  });
}

// ── Nav ───────────────────────────────────────────────────────
function goTab(tab){
  STATE.tab=tab;
  document.querySelectorAll('.nav button').forEach(function(b,i){
    var tabs=['dash','rank','ventas','obj','feriados'];
    b.classList.toggle('on',tabs[i]===tab);
  });
  render();
}

// ── Computed ──────────────────────────────────────────────────
function getSellerData(){
  var m=STATE.selMonth,y=STATE.selYear;
  var dl=buildDays(m,y,getHols(m,y));
  var twd=totalWD(dl);
  var isCur=m===TODAY.getMonth()&&y===TODAY.getFullYear();
  var todDay=isCur?TODAY.getDate():daysInMonth(m,y);
  var elWD=wdUpTo(dl,todDay);
  var remWD=twd-elWD;
  return STATE.sellers.map(function(seller){
    var ss=STATE.sales.filter(function(s){
      var d=new Date(s.date);
      return !isNaN(d)&&d.getMonth()===m&&d.getFullYear()===y&&s.seller===seller;
    });
    var total=ss.reduce(function(a,b){return a+b.amount;},0);
    var goal=(STATE.goals[seller]&&STATE.goals[seller][m])||0;
    var p=pct(total,goal),gap=goal-total;
    var exp=goal&&twd?Math.round(goal/twd*elWD):0;
    return {seller:seller,total:total,goal:goal,p:p,gap:gap,vsExp:total-exp,
      dailyAvg:elWD?Math.round(total/elWD):0,
      dailyNeed:goal&&remWD?Math.round(Math.max(0,gap)/remWD):0,
      elWD:elWD,twd:twd,remWD:remWD};
  });
}
function getMonthSales(){
  var m=STATE.selMonth,y=STATE.selYear;
  return STATE.sales.filter(function(s){
    var d=new Date(s.date);
    return !isNaN(d)&&d.getMonth()===m&&d.getFullYear()===y;
  });
}

// ── Render ────────────────────────────────────────────────────
function render(){
  var el=document.getElementById('content');
  if(!el) return;
  var fn={dash:renderDash,rank:renderRank,ventas:renderVentas,obj:renderObj,feriados:renderFeriados}[STATE.tab];
  el.innerHTML=fn?fn():'';
}

function periodSel(){
  var opts='';
  for(var i=0;i<12;i++) opts+='<option value="'+i+'"'+(i===STATE.selMonth?' selected':'')+'>'+MONTHS[i]+'</option>';
  return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap"><span style="color:#a8b3c2;font-size:13px;flex-shrink:0">Período:</span><select style="width:auto;min-width:120px" onchange="STATE.selMonth=+this.value;render()">'+opts+'</select><input type="number" value="'+STATE.selYear+'" style="width:72px" onchange="STATE.selYear=+this.value;render()"/></div>';
}
function kCard(label,value,sub,color){
  return '<div class="card" style="'+(color?'border-color:'+color+'44':'')+'">'
    +'<div style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#a8b3c2;margin-bottom:3px">'+label+'</div>'
    +'<div style="font-size:18px;font-weight:700;color:'+(color||'#e8edf5')+'">'+value+'</div>'
    +'<div style="font-size:12px;color:#a8b3c2;margin-top:3px">'+sub+'</div></div>';
}
function bar(p,color,h){
  h=h||8;
  return '<div class="pbg" style="height:'+h+'px"><div class="pfill" style="width:'+Math.min(100,p)+'%;height:'+h+'px;background:'+color+'"></div></div>';
}

function renderDash(){
  var m=STATE.selMonth,y=STATE.selYear;
  var dl=buildDays(m,y,getHols(m,y));
  var twd=totalWD(dl);
  var isCur=m===TODAY.getMonth()&&y===TODAY.getFullYear();
  var todDay=isCur?TODAY.getDate():daysInMonth(m,y);
  var elWD=wdUpTo(dl,todDay);
  var remWD=twd-elWD;
  var mthPct=twd?Math.round(elWD/twd*100):0;
  var rows=getSellerData();
  var tv=rows.reduce(function(a,b){return a+b.total;},0);
  var tg=rows.reduce(function(a,b){return a+b.goal;},0);
  var tp=pct(tv,tg),tc=sc(tp),tgap=tg-tv;
  var tdAvg=elWD?Math.round(tv/elWD):0;
  var tdNeed=tg&&remWD?Math.round(Math.max(0,tgap)/remWD):0;
  var tvsExp=tv-(tg&&twd?Math.round(tg/twd*elWD):0);
  var billedAmt=STATE.billed[bKey(m,y)]||0;
  var billableAmt=STATE.billable[bKey(m,y)]||0;
  var backorder=tv-(billedAmt+billableAmt);

  var h=periodSel();
  h+='<div style="font-size:11px;color:#a8b3c2;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px">Empresa</div>';
  h+='<div class="kv">';
  h+=kCard('Venta Total',fmt(tv),MS[m]+' '+y);
  h+=kCard('Objetivo',fmt(tg),'suma vendedores');
  h+=kCard('Avance',tp+'%','<span style="color:'+(tp>=mthPct?'#00e5a0':'#ff5e5e')+'">'+tp+'%</span> vs <span style="color:#58a6ff">'+mthPct+'%</span> mes',tp>=mthPct?'#00e5a0':'#ff5e5e');
  h+=kCard('Dias habiles',elWD+'/'+twd,remWD+' restantes');
  h+='</div>';

  h+='<div class="card" style="border-color:'+tc+'44">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px"><b>Avance global</b><span style="font-size:22px;font-weight:700;color:'+tc+'">'+tp+'%</span></div>';
  h+='<div style="font-size:13px;color:#d8dfe8;margin-bottom:8px">'+fmt(tv)+' / '+fmt(tg)+'</div>';
  h+=bar(tp,tc,12);
  h+='<div style="display:flex;gap:12px;font-size:12px;color:#a8b3c2;flex-wrap:wrap;margin-top:8px">';
  h+='<span>Resta: <b style="color:#d8dfe8">'+fmt(Math.max(0,tgap))+'</b></span>';
  h+='<span>Prom/dia: <b style="color:#d8dfe8">'+fmt(tdAvg)+'</b></span>';
  if(tgap>0&&remWD>0) h+='<span>Necesita: <b style="color:'+(tdNeed<=tdAvg?'#00e5a0':'#f5c542')+'">'+fmt(tdNeed)+'/dia</b></span>';
  h+='<span>vs ritmo: <b style="color:'+(tvsExp>=0?'#00e5a0':'#ff5e5e')+'">'+(tvsExp>=0?'+':'')+fmt(tvsExp)+'</b></span>';
  h+='</div></div>';

  h+='<div class="card"><b style="display:block;margin-bottom:10px">Facturado · Facturable · Backorder</b>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  [{l:'Vendido',v:tv,c:'#58a6ff',s:'100%'},
   {l:'Facturado',v:billedAmt||null,c:'#2ea043',s:billedAmt&&tv?Math.round(billedAmt/tv*100)+'%':null},
   {l:'Facturable',v:billableAmt||null,c:'#b08aff',s:billableAmt&&tv?Math.round(billableAmt/tv*100)+'%':null},
   {l:'Backorder',v:(billedAmt||billableAmt)?Math.abs(backorder):null,c:backorder>0?'#ff5e5e':backorder===0?'#00e5a0':'#f5c542',s:(billedAmt||billableAmt)?(backorder>0?'sin destino':backorder===0?'todo asignado':'exceso'):null}
  ].forEach(function(b2){
    h+='<div style="background:#111318;border-radius:10px;padding:10px 12px;border-left:3px solid '+b2.c+'">';
    h+='<div style="font-size:11px;color:#a8b3c2;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">'+b2.l+'</div>';
    if(b2.v!=null) h+='<div style="font-size:16px;font-weight:700;color:'+b2.c+'">'+fmt(b2.v)+'</div>'+(b2.s?'<div style="font-size:12px;color:#a8b3c2;margin-top:2px">'+b2.s+'</div>':'');
    else h+='<span style="color:#7a8799;font-size:13px">Sin dato</span>';
    h+='</div>';
  });
  h+='</div></div>';

  h+='<div style="font-size:11px;color:#a8b3c2;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px">Vendedores</div>';
  rows.forEach(function(r){
    var color=sc(r.p);
    h+='<div class="card">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div><div style="font-weight:600;font-size:14px">'+r.seller+'</div><div style="color:#d8dfe8;font-size:12px;margin-top:2px">'+fmt(r.total)+' / '+(r.goal?fmt(r.goal):'sin obj.')+'</div></div>';
    h+='<span style="font-size:20px;font-weight:700;color:'+color+'">'+r.p+'%</span></div>';
    h+=bar(r.p,color,8);
    if(r.goal>0){
      h+='<div style="display:flex;gap:10px;font-size:12px;color:#a8b3c2;flex-wrap:wrap;margin-top:6px">';
      h+='<span>Resta: <b style="color:#d8dfe8">'+fmt(Math.max(0,r.gap))+'</b></span>';
      h+='<span>Prom: <b style="color:#d8dfe8">'+fmt(r.dailyAvg)+'</b></span>';
      if(r.gap>0&&r.remWD>0) h+='<span>Nec: <b style="color:'+(r.dailyNeed<=r.dailyAvg?'#00e5a0':'#f5c542')+'">'+fmt(r.dailyNeed)+'/dia</b></span>';
      if(r.vsExp!==0) h+='<span>vs ritmo: <b style="color:'+(r.vsExp>=0?'#00e5a0':'#ff5e5e')+'">'+(r.vsExp>=0?'+':'')+fmt(r.vsExp)+'</b></span>';
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}

function renderRank(){
  var rows=getSellerData().sort(function(a,b){return b.p-a.p;});
  var maxT=Math.max.apply(null,rows.map(function(r){return r.total;}).concat([1]));
  var medals=['🥇','🥈','🥉'];
  var h=periodSel();
  h+='<div class="card" style="padding:0 14px">';
  rows.forEach(function(r,i){
    var color=sc(r.p);
    h+='<div style="display:flex;align-items:center;gap:10px;padding:12px 0;'+(i<rows.length-1?'border-bottom:1px solid #2d3440':'')+'">';
    h+='<div style="width:28px;text-align:center;flex-shrink:0;font-size:'+(i<3?18:13)+'px;color:'+(i<3?'#f5c542':'#a8b3c2')+';font-weight:700">'+(i<3?medals[i]:'#'+(i+1))+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.seller+'</span><span style="color:#d8dfe8;flex-shrink:0;margin-left:8px">'+fmt(r.total)+'</span></div>';
    h+=bar(Math.round(r.total/maxT*100),color,6);
    h+='</div><span class="chip" style="background:'+color+'22;color:'+color+';flex-shrink:0">'+r.p+'%</span></div>';
  });
  h+='</div>';
  return h;
}

function renderVentas(){
  var ms=getMonthSales().sort(function(a,b){return a.date<b.date?1:-1;});
  var total=ms.reduce(function(a,b){return a+b.amount;},0);
  var h=periodSel();
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="color:#d8dfe8"><b style="color:#e8edf5">'+ms.length+'</b> registros</span><span style="color:#2ea043;font-weight:700">'+fmt(total)+'</span></div>';
  if(!ms.length) return h+'<div class="card" style="text-align:center;padding:28px;color:#a8b3c2">Sin ventas en este periodo.</div>';
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Fecha</th><th>Vendedor</th><th>Cliente</th><th>Importe</th></tr></thead><tbody>';
  ms.slice(0,300).forEach(function(s){
    h+='<tr><td style="color:#a8b3c2;white-space:nowrap">'+s.date+'</td><td style="white-space:nowrap">'+s.seller+'</td><td style="color:#a8b3c2;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(s.client||'-')+'</td><td style="color:#2ea043;font-weight:600;white-space:nowrap">'+fmt(s.amount)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function renderObj(){
  var rows=getSellerData();
  var h='<div style="overflow-x:auto"><table><thead><tr><th style="position:sticky;left:0;background:#1a1f28;z-index:2">Vendedor</th>';
  MS.forEach(function(m,i){h+='<th style="text-align:center;min-width:52px;color:'+(i===STATE.selMonth?'#58a6ff':'#a8b3c2')+'">'+m+'</th>';});
  h+='</tr></thead><tbody>';
  STATE.sellers.forEach(function(seller){
    var r=rows.find(function(x){return x.seller===seller;})||{total:0};
    h+='<tr><td style="font-weight:500;white-space:nowrap;position:sticky;left:0;background:#1a1f28;z-index:1">'+seller+'</td>';
    for(var mo=0;mo<12;mo++){
      var g=STATE.goals[seller]&&STATE.goals[seller][mo];
      var color=sc(pct(mo===STATE.selMonth?r.total:0,g||0));
      h+='<td style="text-align:center;padding:6px 4px">'+(g?'<span style="font-size:12px;font-weight:600;color:'+(mo===STATE.selMonth?color:'#2ea043')+'">${'+(g/1000).toFixed(0)+'k</span>':'<span style="color:#7a8799;font-size:12px">-</span>')+'</td>';
    }
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function renderFeriados(){
  var m=STATE.selMonth,y=STATE.selYear,hols=getHols(m,y);
  var dl=buildDays(m,y,hols);
  var fdow=new Date(y,m,1).getDay(),adj=(fdow+6)%7;
  var todISO=isoD(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  var opts='';
  for(var i=0;i<12;i++) opts+='<option value="'+i+'"'+(i===m?' selected':'')+'>'+MONTHS[i]+'</option>';
  var h='<div style="max-width:440px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  h+='<select style="width:auto;min-width:120px" onchange="STATE.selMonth=+this.value;render()">'+opts+'</select>';
  h+='<input type="number" value="'+y+'" style="width:72px" onchange="STATE.selYear=+this.value;render()"/>';
  h+='<span class="chip" style="background:#ff5e5e22;color:#ff5e5e">'+hols.length+' feriados</span>';
  h+='<span class="chip" style="background:#58a6ff22;color:#58a6ff">'+totalWD(dl)+' habiles</span></div>';
  h+='<div class="card"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  ['L','M','X','J','V','S','D'].forEach(function(d){h+='<div style="text-align:center;font-size:12px;color:#a8b3c2;padding:3px;font-weight:600">'+d+'</div>';});
  h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var e=0;e<adj;e++) h+='<div></div>';
  dl.forEach(function(day){
    var dow=new Date(y,m,day.d).getDay(),isW=dow===0||dow===6;
    var isH=hols.indexOf(day.s)!==-1,isT=day.s===todISO;
    h+='<div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;background:'+(isH?'#ff5e5e22':isT?'#58a6ff15':'transparent')+';color:'+(isH?'#ff5e5e':isW?'#5a6475':'#e8edf5')+';border:'+(isH?'1px solid #ff5e5e44':isT?'1px solid #58a6ff55':'1px solid transparent')+';font-weight:'+(isH?700:'normal')+'">'+day.d+'</div>';
  });
  h+='</div></div></div>';
  return h;
}

function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  t.style.background=err?'#2d1a1a':'#1a2d1a';
  t.style.border='1px solid '+(err?'#ff5e5e33':'#2ea04333');
  t.style.color=err?'#ff5e5e':'#2ea043';
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.style.display='none';},4000);
}

// Iniciar
loadAll();
</script>
